version: '3.7'
services:
  mysql_db:
    image: mysql:latest
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: '1q2w3e4r'
      MYSQL_DATABASE: 'web-app'
      MYSQL_USER: 'ironman'
      MYSQL_PASSWORD: '1q2w3e4r'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: mysql_db
      PMA_PORT: 3306
    ports:
      - "8090:80"
    depends_on:
      - mysql_db

  web_app:
    image: php:apache
    container_name: web_app
    ports:
      - "8080:80"
    volumes:
      - /Users/batuatalay/Desktop/MVC:/var/www/html
    #command: bash -c "a2enmod rewrite && service apache2 restart"

volumes:
  mysql_data:

